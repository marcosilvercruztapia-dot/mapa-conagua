<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo México RHA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Fondo negro total para que solo exista México */
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #000; color: white; text-align: center; overflow: hidden; }
        #map { height: 85vh; width: 100%; max-width: 1100px; margin: 0 auto; background: #000; border-radius: 20px; }
        .leaflet-popup-content-wrapper { background: #1a1a1a; color: #fff; border: 1px solid #00FF88; }
        h2 { color: #00FF88; font-size: 24px; text-shadow: 0 0 15px rgba(0,255,136,0.6); }
    </style>
</head>
<body>

    <h2>REGIONES HIDROLÓGICO-ADMINISTRATIVAS (CONAGUA)</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializamos el mapa sin el zoom touch/scroll para que no se pierda el país
        var map = L.map('map', { 
            attributionControl: false,
            zoomSnap: 0.1
        }).setView([23.5, -102.5], 5);

        // --- NO cargamos TileLayer para que el resto del mundo NO exista ---

        const datosRHA = {
            "Hidalgo": "RHA 9, 10 y 13: Golfo Norte, Golfo Centro y Valle de México",
            "Estado de México": "RHA 4, 8 y 13: Balsas, Lerma-Santiago y Valle de México",
            "Ciudad de México": "RHA 13: Aguas del Valle de México",
            "Puebla": "RHA 4, 9 y 10: Balsas, Golfo Norte y Golfo Centro",
            "Baja California": "RHA 1: Península de Baja California",
            "Baja California Sur": "RHA 1: Península de Baja California",
            "Sonora": "RHA 2: Noroeste | RHA 3: Pacífico Norte",
            "Chihuahua": "RHA 2: Noroeste | RHA 6: Río Bravo",
            "Sinaloa": "RHA 3: Pacífico Norte",
            "Nayarit": "RHA 3: Pacífico Norte | RHA 8: Lerma-Santiago-Pacífico",
            "Durango": "RHA 3: Pacífico Norte | RHA 6: Río Bravo | RHA 7: Cuencas Centrales del Norte",
            "Zacatecas": "RHA 3: Pacífico Norte | RHA 7: Cuencas Centrales del Norte | RHA 8: Lerma-Santiago-Pacífico",
            "Guerrero": "RHA 4: Balsas | RHA 5: Pacífico Sur",
            "Oaxaca": "RHA 4: Balsas | RHA 5: Pacífico Sur | RHA 10: Golfo Centro | RHA 11: Frontera Sur",
            "Chiapas": "RHA 5: Pacífico Sur | RHA 11: Frontera Sur",
            "Nuevo León": "RHA 6: Río Bravo",
            "Tamaulipas": "RHA 6: Río Bravo | RHA 9: Golfo Norte",
            "San Luis Potosí": "RHA 7: Cuencas Centrales del Norte | RHA 9: Golfo Norte",
            "Veracruz de Ignacio de la Llave": "RHA 9: Golfo Norte | RHA 10: Golfo Centro",
            "Tabasco": "RHA 10: Golfo Centro | RHA 11: Frontera Sur",
            "Yucatán": "RHA 12: Península de Yucatán",
            "Quintana Roo": "RHA 12: Península de Yucatán",
            "Campeche": "RHA 11: Frontera Sur | RHA 12: Península de Yucatán"
        };

        fetch('https://raw.githubusercontent.com/angelnmaya/mexico-states-geojson/master/mexico.json')
            .then(res => res.json())
            .then(data => {
                var layer = L.geoJSON(data, {
                    style: { 
                        color: "#00FF88", // Borde neón
                        weight: 1.5, 
                        fillColor: "#004422", 
                        fillOpacity: 0.8 
                    },
                    onEachFeature: function(feature, layer) {
                        let nombre = feature.properties.name;
                        layer.on('click', function(e) {
                            let info = datosRHA[nombre] || "Datos de CONAGUA disponibles.";
                            L.popup().setLatLng(e.latlng).setContent(`<b>${nombre}</b><br>${info}`).openOn(map);
                        });
                        layer.on('mouseover', function() { this.setStyle({ fillOpacity: 1, fillColor: "#00FF88", color: "white" }); });
                        layer.on('mouseout', function() { this.setStyle({ fillOpacity: 0.8, fillColor: "#004422", color: "#00FF88" }); });
                    }
                }).addTo(map);
                map.fitBounds(layer.getBounds());
            });
    </script>
</body>
</html>
